name: "Generate a public release of kofi.js"
on:
  push:
    tags: ["v*"]
jobs:
  npm-release:
    name: "Build and publish in npm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "16.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish
        end:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  